<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RWYCAST · Sistema Operacional ATC Chile</title>

<!-- ===== PWA (instalable en Android e iOS) ===== -->
<meta name="description" content="Sistema operacional ATC Chile — pistas en uso, STAR, aproximaciones y METAR en tiempo real.">
<meta name="theme-color" content="#070b0e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<!-- iOS / Safari: "Agregar a pantalla de inicio" -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RWYCAST">
<link rel="apple-touch-icon" href="icon-512.png">
<style>
  :root{
    /* Phosphor control-room palette, grounded in radar/ATIS displays */
    --void:#070b0e;
    --panel:#0d1419;
    --panel-2:#111c22;
    --panel-3:#16242c;
    --line:#1f333c;
    --line-soft:#172a31;
    --ink:#d6e4e8;
    --ink-dim:#6f8893;
    --ink-faint:#48606a;
    --phos:#3ff0a8;        /* primary phosphor green */
    --phos-deep:#0d3a28;
    --amber:#ffb454;       /* caution / change */
    --amber-deep:#7a4e16;
    --red:#ff5e6c;
    --sky:#5cc8ff;
    --violet:#9d8cff;
    --glow:0 0 0.5px rgba(63,240,168,.6), 0 0 14px rgba(63,240,168,.18);
    --mono:'JetBrains Mono','SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(63,240,168,.05), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(92,200,255,.04), transparent 55%),
      var(--void);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  /* faint scanline atmosphere */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;opacity:.6;
  }
  #root{height:100vh;height:100dvh;display:flex;flex-direction:column}

  /* ---------- type ---------- */
  .mono{font-family:var(--mono)}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:0}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:stretch;gap:0;height:54px;flex:0 0 auto;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),var(--panel));
    z-index:40;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:0 18px;border-right:1px solid var(--line);min-width:220px}
  .brand .glyph{width:24px;height:24px;flex:0 0 auto;filter:drop-shadow(var(--glow))}
  .brand b{font-family:var(--mono);font-weight:800;letter-spacing:.14em;font-size:15px;color:var(--phos);text-shadow:var(--glow)}
  .brand small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-faint);margin-top:2px}

  .nav{display:flex;align-items:stretch}
  .nav button{
    background:none;border:none;border-right:1px solid var(--line-soft);color:var(--ink-dim);
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:0 17px;cursor:pointer;position:relative;transition:.15s;
  }
  .nav button:hover{color:var(--ink);background:rgba(63,240,168,.04)}
  .nav button.on{color:var(--phos);background:rgba(63,240,168,.06)}
  .nav button.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--phos);box-shadow:var(--glow)}
  .nav button .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-left:7px;vertical-align:middle;box-shadow:0 0 8px var(--amber);animation:pulse 1.1s infinite}

  .clock{margin-left:auto;display:flex;align-items:center;gap:16px;padding:0 16px;border-left:1px solid var(--line)}
  .clock .cgrp{display:flex;flex-direction:column;align-items:flex-end}
  .clock .z{font-family:var(--mono);font-size:18px;font-weight:700;color:#fff;letter-spacing:.06em;line-height:1.15}
  .clock .z .zu{color:#fff}
  .clock .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ink-faint);text-align:right}
  .who{display:flex;align-items:center;gap:10px;padding:0 16px;border-left:1px solid var(--line);cursor:pointer}
  .who .av{width:30px;height:30px;border:1px solid var(--phos);display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:12px;color:var(--phos)}
  .who .meta{font-family:var(--mono);font-size:10px;line-height:1.5}
  .who .meta b{color:var(--ink);font-size:11px}
  .who .meta span{color:var(--ink-faint)}

  /* ---------- body layout ---------- */
  .stage{flex:1 1 auto;display:flex;min-height:0}
  .rail{
    width:218px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;overflow-y:auto;
  }
  .rail .sec{padding:14px 16px 8px;border-bottom:1px solid var(--line-soft)}
  .rail .sec .eyebrow{margin-bottom:9px}
  .unitcard{padding:11px 13px;border:1px solid var(--line);background:var(--panel-2);margin-bottom:8px}
  .unitcard .code{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--phos);letter-spacing:.08em}
  .unitcard .nm{font-size:11px;color:var(--ink-dim);margin-top:2px}
  .railnav{display:flex;flex-direction:column;padding:8px 0}
  .railnav button{
    display:flex;align-items:center;gap:11px;background:none;border:none;color:var(--ink-dim);
    font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;padding:11px 16px;cursor:pointer;
    text-align:left;border-left:2px solid transparent;transition:.14s;
  }
  .railnav button:hover{color:var(--ink);background:rgba(255,255,255,.02)}
  .railnav button.on{color:var(--phos);border-left-color:var(--phos);background:rgba(63,240,168,.05)}
  .railnav button svg{width:15px;height:15px;flex:0 0 auto;opacity:.85}
  .railnav .badge{margin-left:auto;font-size:9px;font-family:var(--mono);background:var(--amber);color:#1a1205;padding:1px 6px;font-weight:700;border-radius:2px}

  .content{flex:1 1 auto;overflow-y:auto;padding:0;min-width:0;position:relative}

  /* ---------- generic panel ---------- */
  .panel{border:1px solid var(--line);background:var(--panel);}
  .phead{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--panel-2)}
  .phead h3{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);font-weight:700}
  .phead .sub{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:auto;letter-spacing:.1em}

  /* ---------- status strip ---------- */
  .strip{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--line);background:var(--panel)}
  .strip .cell{padding:14px 18px;border-right:1px solid var(--line-soft)}
  .strip .cell:last-child{border-right:none}
  .strip .cell .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase}
  .strip .cell .v{font-family:var(--mono);font-size:28px;font-weight:800;margin-top:6px;line-height:1;color:var(--ink)}
  .strip .cell .v.g{color:var(--phos);text-shadow:var(--glow)}
  .strip .cell .v.a{color:var(--amber)}
  .strip .cell .v small{font-size:13px;color:var(--ink-dim);font-weight:600}

  /* ---------- airport grid ---------- */
  .gridwrap{padding:18px}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1 1 240px;display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--panel-2);padding:9px 13px;min-width:200px}
  .search input{background:none;border:none;outline:none;color:var(--ink);font-family:var(--mono);font-size:12px;width:100%}
  .search svg{width:14px;height:14px;color:var(--ink-faint)}
  .filterbtn{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;padding:9px 13px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-dim);cursor:pointer;transition:.14s}
  .filterbtn:hover{color:var(--ink);border-color:var(--ink-faint)}
  .filterbtn.on{color:var(--phos);border-color:var(--phos);background:rgba(63,240,168,.06)}
  .toolbar select{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:9px 13px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-dim);cursor:pointer;outline:none;transition:.14s}
  .toolbar select:hover{color:var(--ink);border-color:var(--ink-faint)}
  .toolbar select:focus{border-color:var(--phos);color:var(--ink)}

  .apgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}

  .apcard{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),var(--panel));position:relative;overflow:hidden}
  .apcard .crest{display:flex;align-items:flex-start;gap:12px;padding:14px 15px;border-bottom:1px solid var(--line-soft)}
  .apcard .icao{font-family:var(--mono);font-weight:800;font-size:22px;letter-spacing:.05em;color:var(--phos);text-shadow:var(--glow);line-height:1}
  .apcard .nm{font-size:12px;color:var(--ink);font-weight:600;margin-top:5px}
  .apcard .city{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:2px;letter-spacing:.06em}
  .apcard .owntag{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink-faint);text-align:right;line-height:1.5}
  .apcard .owntag b{color:var(--sky);display:block}

  .opfields{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--line-soft)}
  .opfields.two{grid-template-columns:1fr 1fr}
  .opf{padding:12px 13px;border-right:1px solid var(--line-soft);position:relative}
  .opf:last-child{border-right:none}
  .opf .k{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase}
  .opf .val{font-family:var(--mono);font-size:19px;font-weight:800;color:var(--ink);margin-top:7px;line-height:1;letter-spacing:.02em}
  .opf .val.empty{color:var(--ink-faint);font-weight:500;font-size:14px}
  /* puntos de entrada con su STAR (apilados hacia abajo) */
  .eplist{border-top:1px solid var(--line-soft)}
  .eprow{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line-soft)}
  .eprow:first-child{border-top:none}
  .epf{padding:10px 13px;border-right:1px solid var(--line-soft)}
  .epf:last-child{border-right:none}
  .epf .k{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase}
  .epf .val{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--ink);margin-top:5px;line-height:1;letter-spacing:.02em}
  .epf .val.empty{color:var(--ink-faint);font-weight:500;font-size:13px}

  /* blink signalling */
  @keyframes flashfield{
    0%,100%{background:transparent}
    50%{background:rgba(255,180,84,.22)}
  }
  @keyframes flashborder{
    0%,100%{box-shadow:inset 0 0 0 1px transparent}
    50%{box-shadow:inset 0 0 0 2px var(--amber)}
  }
  .opf.changed{animation:flashfield 1s ease-in-out infinite}
  .opf.changed .val{color:var(--amber);text-shadow:0 0 10px rgba(255,180,84,.4)}
  .opf.changed::after{content:"▲ UPD";position:absolute;top:8px;right:9px;font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;color:var(--amber)}
  .apcard.changed{animation:flashborder 1s ease-in-out infinite}

  .apfoot{display:flex;align-items:center;gap:10px;padding:9px 13px;border-top:1px solid var(--line-soft);background:rgba(0,0,0,.18)}
  .apfoot .age{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);letter-spacing:.06em}
  .apfoot .by{font-family:var(--mono);font-size:9.5px;color:var(--ink-dim);margin-left:auto}
  .apfoot .editlink{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--phos);cursor:pointer;text-transform:uppercase;border:1px solid var(--line);padding:4px 9px}
  .apfoot .editlink:hover{background:rgba(63,240,168,.08)}
  .apfoot .editlink.locked{color:var(--ink-faint);cursor:not-allowed;border-color:var(--line-soft)}
  .apfoot .editlink.rm{color:var(--ink-dim);border-color:var(--line)}
  .apfoot .editlink.rm:hover{color:var(--red);border-color:var(--red);background:rgba(255,94,108,.08)}

  /* add-card (tarjeta-botón "+") */
  .apcard.addcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    min-height:172px;border:1px dashed var(--line);background:rgba(255,255,255,.012);cursor:pointer;
    color:var(--ink-faint);font-family:var(--mono);text-align:center;transition:.15s}
  .apcard.addcard:hover{border-color:var(--phos);color:var(--phos);background:rgba(63,240,168,.04)}
  .apcard.addcard .addplus{font-size:40px;font-weight:300;line-height:.8}
  .apcard.addcard .addtxt{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
  .apcard.addcard .addsub{font-size:9px;letter-spacing:.1em;color:var(--ink-faint)}

  /* picker modal (agregar a Mi jurisdicción) */
  .scrim.center{justify-content:center;align-items:center}
  .pickbox{width:min(440px,94vw);max-height:80vh;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--phos);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slidein .2s}
  .pickhead{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .pickhead b{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .pickhead .x{margin-left:auto;background:none;border:1px solid var(--line);color:var(--ink-dim);width:30px;height:30px;cursor:pointer;font-size:14px}
  .pickhead .x:hover{color:var(--ink);border-color:var(--ink-faint)}
  .picklist{overflow-y:auto;padding:9px}
  .pickrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 13px;margin-bottom:6px;
    border:1px solid var(--line);background:var(--panel-2);color:var(--ink);cursor:pointer;font-family:var(--mono);transition:.13s}
  .pickrow:last-child{margin-bottom:0}
  .pickrow:hover{border-color:var(--phos);background:rgba(63,240,168,.05)}
  .pickrow .pickicao{font-weight:800;color:var(--phos);font-size:14px;min-width:52px;letter-spacing:.04em}
  .pickrow .picknm{flex:1;font-size:11px;color:var(--ink-dim)}
  .pickrow .pickplus{font-size:10px;letter-spacing:.08em;color:var(--phos);text-transform:uppercase;white-space:nowrap}

  .metarline{padding:9px 13px;border-top:1px solid var(--line-soft);font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);letter-spacing:.02em;line-height:1.5;word-break:break-word;display:flex;gap:8px;align-items:baseline}
  .metarline .fr{flex:0 0 auto;font-weight:700;padding:1px 6px;font-size:9px;letter-spacing:.08em}
  .metarline .mage{margin-left:auto;flex:0 0 auto;color:var(--ink-faint);font-size:9px;letter-spacing:.06em;white-space:nowrap}
  .fr.VFR{color:var(--phos);border:1px solid var(--phos)}
  .fr.MVFR{color:var(--sky);border:1px solid var(--sky)}
  .fr.IFR{color:var(--amber);border:1px solid var(--amber)}
  .fr.LIFR{color:var(--red);border:1px solid var(--red)}

  /* ---------- pills ---------- */
  .pill{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid;font-weight:700;white-space:nowrap}
  .pill.ok{color:var(--phos);border-color:var(--phos)}
  .pill.warn{color:var(--amber);border-color:var(--amber)}
  .pill.off{color:var(--ink-faint);border-color:var(--line)}

  /* ---------- editor drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(2,5,7,.72);backdrop-filter:blur(3px);z-index:80;display:flex;justify-content:flex-end;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slidein{from{transform:translateX(30px);opacity:.4}to{transform:translateX(0);opacity:1}}
  .drawer{width:min(480px,100%);height:100%;background:var(--panel);border-left:1px solid var(--phos);box-shadow:-30px 0 60px rgba(0,0,0,.5);display:flex;flex-direction:column;animation:slidein .22s}
  .drawer .dhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .drawer .dhead .icao{font-family:var(--mono);font-weight:800;font-size:24px;color:var(--phos);text-shadow:var(--glow)}
  .drawer .dhead .x{margin-left:auto;background:none;border:1px solid var(--line);color:var(--ink-dim);width:32px;height:32px;cursor:pointer;font-size:16px}
  .drawer .x:hover{color:var(--ink);border-color:var(--ink-faint)}
  .dbody{flex:1;overflow-y:auto;padding:20px}
  .field{margin-bottom:18px}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
  .field label .hint{color:var(--ink-faint);text-transform:none;letter-spacing:0;font-size:9.5px;float:right}
  .field input,.field select,.field textarea{
    width:100%;background:var(--void);border:1px solid var(--line);color:var(--phos);
    font-family:var(--mono);font-size:16px;font-weight:700;padding:11px 13px;outline:none;letter-spacing:.04em;
  }
  .field textarea{font-weight:500;font-size:12px;color:var(--ink);min-height:64px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--phos);box-shadow:0 0 0 1px var(--phos)}
  .seg{display:flex;flex-wrap:wrap;gap:7px}
  .seg button{flex:0 0 auto;font-family:var(--mono);font-size:13px;font-weight:700;padding:9px 13px;border:1px solid var(--line);background:var(--void);color:var(--ink-dim);cursor:pointer;transition:.13s}
  .seg button:hover{color:var(--ink);border-color:var(--ink-faint)}
  .seg button.on{color:var(--void);background:var(--phos);border-color:var(--phos)}
  /* selector de STAR en uso por punto de entrada (editor operacional) */
  .epuse{border:1px solid var(--line);background:var(--void)}
  .epuserow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
  .epuserow:last-child{border-bottom:none}
  .epusep{font-family:var(--mono);font-size:13px;font-weight:800;color:var(--phos);min-width:62px;letter-spacing:.04em}
  .epuserow .seg{flex:1}
  .epusenone{font-family:var(--mono);font-size:10.5px;color:var(--amber)}
  .dfoot{padding:16px 20px;border-top:1px solid var(--line);display:flex;gap:10px}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:12px 18px;cursor:pointer;border:1px solid;transition:.14s}
  .btn.primary{background:var(--phos);border-color:var(--phos);color:var(--void)}
  .btn.primary:hover{box-shadow:var(--glow)}
  .btn.ghost{background:none;border-color:var(--line);color:var(--ink-dim)}
  .btn.ghost:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .diffbox{border:1px solid var(--amber-deep);background:rgba(255,180,84,.06);padding:12px 14px;margin-bottom:18px}
  .diffbox .dl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--amber);text-transform:uppercase;margin-bottom:8px}
  .diffrow{font-family:var(--mono);font-size:11px;color:var(--ink-dim);display:flex;gap:8px;padding:3px 0}
  .diffrow b{color:var(--ink-faint);min-width:64px}
  .diffrow .from{color:var(--ink-faint);text-decoration:line-through}
  .diffrow .to{color:var(--phos);font-weight:700}

  /* ---------- catálogo (pistas / STAR / aprox) ---------- */
  .catwrap{padding:18px;max-width:1120px}
  .catnote{font-family:var(--mono);font-size:11px;color:var(--ink-dim);line-height:1.6;

  .starps{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:9px}

  .starempty{font-family:var(--mono);font-size:10px;color:var(--amber)}
  .catlbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);
    margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .catlbl .catn{font-size:9px;color:var(--phos);border:1px solid var(--line);padding:1px 6px;font-weight:700}
  .catitem{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .catitem input{flex:1;min-width:0;background:var(--void);border:1px solid var(--line);color:var(--phos);
    font-family:var(--mono);font-size:13px;font-weight:700;padding:8px 10px;outline:none;letter-spacing:.04em}
  .catitem input:focus{border-color:var(--phos);box-shadow:0 0 0 1px var(--phos)}
  .catrm{flex:0 0 auto;width:30px;height:34px;background:var(--void);border:1px solid var(--line);
    color:var(--ink-faint);cursor:pointer;font-size:12px;transition:.13s}
  .catrm:hover{color:var(--red);border-color:var(--red)}

  .catadd:hover{border-color:var(--phos);color:var(--phos);background:rgba(63,240,168,.04)}
  .catfoot{display:flex;align-items:center;gap:12px;padding:12px 15px;border-top:1px solid var(--line-soft);background:rgba(0,0,0,.18)}

    min-height:150px;border:1px dashed var(--line);background:rgba(255,255,255,.012);cursor:pointer;
    color:var(--ink-faint);font-family:var(--mono);text-align:center;transition:.15s;margin-bottom:16px}
  .catnewcard:hover{border-color:var(--phos);color:var(--phos);background:rgba(63,240,168,.04)}

  .catnewcard .t{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
  .catnewcard .s{font-size:9px;letter-spacing:.1em;color:var(--ink-faint)}

  /* ---------- feed / log ---------- */
  .feed{padding:18px;display:flex;flex-direction:column;gap:0}

  .levt .body .det{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-top:3px;line-height:1.5}

  /* ---------- briefing ---------- */
  .brief{padding:18px;display:grid;grid-template-columns:1fr;gap:14px;max-width:980px}
  .brsec{border:1px solid var(--line);background:var(--panel)}
  .brsec .bh{padding:12px 15px;border-bottom:1px solid var(--line);background:var(--panel-2);display:flex;align-items:center;gap:10px}

  .brrow{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line-soft);font-family:var(--mono);font-size:12px;align-items:baseline}

  .brrow .ic{color:var(--phos);font-weight:800;min-width:54px}
  .brrow .tx{color:var(--ink-dim);line-height:1.5}

  .brrow .tg{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--amber);border:1px solid var(--amber-deep);padding:2px 7px;letter-spacing:.08em}

  .loginbox .lh small{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-faint);display:block;margin-top:6px}
  .loginbox .lb{padding:22px 26px 26px}
  .loginbox .lb .lead{font-family:var(--mono);font-size:11px;color:var(--ink-dim);text-align:center;margin-bottom:18px;letter-spacing:.04em}
  .unitsel{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
  .unitsel button{display:flex;align-items:center;gap:12px;text-align:left;padding:12px 14px;border:1px solid var(--line);background:var(--panel-2);cursor:pointer;transition:.14s}

  .unitsel button .uc{font-family:var(--mono);font-weight:700;color:var(--phos);font-size:13px;min-width:60px}
  .unitsel button .un{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)}

  .empty{padding:60px 20px;text-align:center;font-family:var(--mono);color:var(--ink-faint);font-size:12px;letter-spacing:.06em}

  /* ---------- toast ---------- */
  .toasts{position:fixed;bottom:46px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:11px 18px;border:1px solid var(--phos);background:var(--panel);color:var(--ink);box-shadow:var(--glow);animation:slidein .25s;display:flex;gap:10px;align-items:center}

  /* ---------- alert banner (cambios sin acuse) ---------- */
  .alertbar{position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg,#2a1c06,#190f02);

  .alertrow{display:flex;align-items:center;gap:13px;padding:9px 16px;border-bottom:1px solid var(--line-soft)}

  .alertrow .ai{font-family:var(--mono);font-weight:800;color:var(--amber);font-size:15px;

  .alertrow .ack{flex:0 0 auto;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;
    text-transform:uppercase;font-weight:700;padding:6px 12px;border:1px solid var(--amber);
    background:none;color:var(--amber);cursor:pointer}
  .alertrow .ack:hover{background:rgba(255,180,84,.12)}

  /* ---------- status footer ---------- */
  .footer{flex:0 0 auto;height:34px;border-top:1px solid var(--line);background:var(--panel-2);display:flex;align-items:center;gap:0;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--ink-faint)}
  .footer .fi{padding:0 15px;border-right:1px solid var(--line-soft);height:100%;display:flex;align-items:center;gap:8px}
  .footer .fi b{color:var(--phos)}
  .footer .live{width:7px;height:7px;border-radius:50%;background:var(--phos);box-shadow:0 0 8px var(--phos);animation:pulse 1.4s infinite}
  .footer .right{margin-left:auto;display:flex;align-items:center;height:100%}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---------- mobile ---------- */
  .mtab{display:none}
  @media (max-width:860px){
    .rail{display:none}
    .nav{display:none}
    .clock .lbl{display:none}
    .brand{min-width:0;padding:0 14px}
    .who .meta{display:none}
    .strip{grid-template-columns:repeat(2,1fr)}
    .strip .cell:nth-child(2n){border-right:none}
    .apgrid{grid-template-columns:1fr}
    .opfields{grid-template-columns:1fr 1fr 1fr}
    .content{padding-bottom:58px}
    .mtab{display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;z-index:60;
      background:var(--panel);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
    .mtab button{flex:1;background:none;border:none;color:var(--ink-faint);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;cursor:pointer;position:relative}
    .mtab button svg{width:18px;height:18px}
    .mtab button.on{color:var(--phos)}
    .mtab button .dot{position:absolute;top:8px;right:50%;margin-right:-16px;width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber)}
    .drawer{width:100%}
    .footer{display:none}
    .gridwrap,.feed,.brief,.catwrap{padding:13px}
    .catgrid,.catgrid.two{grid-template-columns:1fr}
    .catcol{border-right:none;border-bottom:1px solid var(--line-soft)}
    .catcol:last-child{border-bottom:none}
    .toasts{bottom:70px}
  }
</style>
</head>

function firebaseConfigured(){
  return !!(window.firebase && FIREBASE_CONFIG.databaseURL
            && FIREBASE_CONFIG.databaseURL.indexOf('TODO')===-1);
}

/* Suscribe a cambios remotos. onState(state, isInitial) se llama en cada actualización.
   Devuelve {mode:'firebase'|'local', stop:fn}. */
function subscribeState(onState){
  if(firebaseConfigured()){
    try{
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      _dbRef=firebase.database().ref(DBPATH);
      let first=true;
      const cb=snap=>{ const v=snap.val(); if(!v) return; onState(v, first); first=false; };
      _dbRef.on('value', cb);
      return {mode:'firebase', stop:()=>{ try{_dbRef.off('value',cb);}catch(e){} }};
    }catch(e){ console.warn('[RWYCAST] Firebase no disponible, modo local:', e); _dbRef=null; }
  }
  // Fallback local (sandbox). NO sincroniza entre dispositivos en GitHub Pages.
  let lastVer=0, alive=true;
  (async()=>{ const s=await loadLocal(); if(s&&alive) onState(s, true); })();
  const poll=setInterval(async()=>{
    if(!alive) return;
    const s=await loadLocal();
    if(s && (s._ver||0)>lastVer){ lastVer=s._ver||0; onState(s, false); }
  },2500);
  return {mode:'local', stop:()=>{ alive=false; clearInterval(poll); }};
}

/* Publica el estado completo a todas las unidades. */
async function publishState(s){
  if(_dbRef){ try{ await _dbRef.set(s); return; }catch(e){ console.warn('[RWYCAST] publish falló:', e); } }
  await saveLocal(s);
}

/* Suscribe a los METAR en vivo (los escribe el job de GitHub Actions en /runcast/metars).
   onMetars({SCEL:{raw,cat,obsTime}, ...}). Devuelve función de limpieza. */
function subscribeMetars(onMetars){
  if(firebaseConfigured()){
    try{
      if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      const ref=firebase.database().ref('runcast/metars');
      const cb=snap=>onMetars(snap.val()||{});
      ref.on('value', cb);
      return ()=>{ try{ ref.off('value',cb); }catch(e){} };
    }catch(e){ console.warn('[RWYCAST] METAR no disponible:', e); }
  }
  return ()=>{};
}

async function loadLocal(){

}

/* ---- Hash de contraseñas (Web Crypto, SHA-256 con sal por usuario) ---- */
function randSalt(){
  const a=new Uint8Array(16); crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashPassword(pw,salt){
  const data=new TextEncoder().encode((salt||'')+':'+pw);
  const buf=await crypto.subtle.digest('SHA-256',data);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function nowZ(){const d=new Date();const p=n=>String(n).padStart(2,'0');return p(d.getUTCHours())+p(d.getUTCMinutes())+p(d.getUTCSeconds())+'Z';}
function clockZ(){const d=new Date();const p=n=>String(n).padStart(2,'0');return {hms:p(d.getUTCHours())+':'+p(d.getUTCMinutes())+':'+p(d.getUTCSeconds()), utc:p(d.getUTCHours())+':'+p(d.getUTCMinutes()), local:p(d.getHours())+':'+p(d.getMinutes())};}
function ageMin(ts){if(!ts)return '—';const m=Math.floor((Date.now()-ts)/60000);if(m<1)return 'hace <1 min';if(m<60)return 'hace '+m+' min';return 'hace '+Math.floor(m/60)+'h '+(m%60)+'m';}

const SESSION_KEY='runcast:session';   // sesión recordada ("mantener sesión iniciada")

function App(){
  // restaura la sesión recordada en el dispositivo (si el usuario marcó la casilla)
  const [user,setUser]=useState(()=>{

  const [airports,setAirports]=useState(()=>AIRPORTS.map(a=>({...a,updatedAt:Date.now()-Math.floor(Math.random()*4000000),updatedBy:'sistema',changed:[]})));

  const [editing,setEditing]=useState(null);
  const [query,setQuery]=useState('');

  const [toasts,setToasts]=useState([]);
  const [clock,setClock]=useState(clockZ());
  const [unread,setUnread]=useState(0);
  const [alerts,setAlerts]=useState([]);   // cambios de otras unidades sin acuse
  const [syncMode,setSyncMode]=useState('local');
  const [metars,setMetars]=useState({});   // METAR en vivo desde /runcast/metars
  const [watch,setWatch]=useState([]);     // watchlist personal (ICAOs) de "Mi jurisdicción"
  const [users,setUsers]=useState({});       // base de usuarios (runcast/users)
  const [editingUser,setEditingUser]=useState(null); // usuario en edición (panel admin)
  const lastVer=useRef(0);
  const userRef=useRef(null); userRef.current=user;
  const usersMapRef=useRef({}); usersMapRef.current=users;
  const seenLogs=useRef(new Set());          // ids de eventos ya procesados

  // clock
  useEffect(()=>{const t=setInterval(()=>setClock(clockZ()),1000);return ()=>clearInterval(t);},[]);

  // suscripción en tiempo real a los cambios de cualquier unidad
  useEffect(()=>{
    const sub=subscribeState((s,isInitial)=>{
      // ignora el "eco" de nuestra propia publicación (mismo _ver ya aplicado)
      if(!isInitial && (s._ver||0)<=lastVer.current) return;
      applyRemote(s, !isInitial);
    });
    setSyncMode(sub.mode);
    return sub.stop;
  },[]);

  // suscripción en tiempo real a los METAR (alimentados por GitHub Actions)
  useEffect(()=>subscribeMetars(setMetars),[]);

  // base de usuarios: siembra el admin inicial y suscribe los cambios
  useEffect(()=>{
    ensureSeedAdmin().catch(e=>console.warn('[RWYCAST] seed admin:',e));
    return subscribeUsers(u=>setUsers(u||{}));
  },[]);

  // control de rutas: si la vista actual no está permitida para el rol, redirige
  useEffect(()=>{
    if(user && !viewsFor(user.role).includes(view)) setView(viewsFor(user.role)[0]);
  },[user,view]);

  // mantiene actualizada la sesión recordada (solo si existe) cuando cambia el perfil,
  // p. ej. al limpiar mustChangePassword tras un cambio de contraseña.
  useEffect(()=>{
    try{
      if(user && localStorage.getItem(SESSION_KEY)) localStorage.setItem(SESSION_KEY, JSON.stringify(user));
    }catch(e){}
  },[user]);

  // revalida la sesión recordada contra la base de usuarios ya sincronizada:
  // si la cuenta fue eliminada o desactivada, cierra la sesión automáticamente.
  useEffect(()=>{
    const u=userRef.current;
    if(!u || !users || !Object.keys(users).length) return;
    const rec=users[u.username];
    if(!rec || rec.active===false) logout();
  },[users]);

  // watchlist personal por unidad (persistida en el dispositivo)
  useEffect(()=>{
    if(!user) return;
    let saved=null;
    try{ saved=JSON.parse(localStorage.getItem('runcast:watch:'+user.username)||'null'); }catch(e){}
    const myUnits=userUnits(user);
    const def = user.role==='unit' ? AIRPORTS.filter(a=>myUnits.includes(a.owner)).map(a=>a.icao)
              : user.role==='general' ? []
              : AIRPORTS.map(a=>a.icao);   // admin / sector observan toda la red
    setWatch(Array.isArray(saved) ? saved : def);
  },[user]);
  useEffect(()=>{
    if(!user) return;
    try{ localStorage.setItem('runcast:watch:'+user.username, JSON.stringify(watch)); }catch(e){}
  },[watch,user]);

  const addWatch=icao=>setWatch(w=>w.includes(icao)?w:[...w,icao]);
  const removeWatch=icao=>setWatch(w=>w.filter(x=>x!==icao));

  function applyRemote(s, signal){
    lastVer.current=s._ver||0;
    const me=userRef.current;
    if(s.airports){
      setAirports(prev=>{
        return s.airports.map(na=>{
          const old=prev.find(p=>p.icao===na.icao);
          // detecta cambio externo para el parpadeo
          const changed=[];
          if(old && signal){
            ['rwyu','appu'].forEach(f=>{ if((old[f]||[]).join('|')!==(na[f]||[]).join('|')) changed.push(f); });
            if(JSON.stringify(old.epuse||{})!==JSON.stringify(na.epuse||{})) changed.push('epuse');
          }
          // el parpadeo persiste hasta que se acuse (no se auto-borra)
          return {...na, changed: signal ? (changed.length?changed:(old?old.changed:[])) : [] };
        });
      });
    }
    if(s.logs) setLogs(s.logs);

    const logs=s.logs||[];
    // carga inicial: marca todo el historial como visto, sin alertar
    if(!signal){ logs.forEach(l=>seenLogs.current.add(l.id)); return; }

    // eventos nuevos de OTRAS unidades → alerta persistente + toast
    const myUnits=userUnits(me);
    const fresh=logs.filter(l=> !seenLogs.current.has(l.id) && (!me || !myUnits.includes(l.unit)));
    logs.forEach(l=>seenLogs.current.add(l.id)); // incluye los propios para no auto-alertar
    if(fresh.length){
      setAlerts(prev=>{
        const have=new Set(prev.map(a=>a.id));
        const add=fresh.filter(l=>!have.has(l.id)).map(l=>(
          {id:l.id, icao:l.icao, unit:l.unit, user:l.user, summary:l.summary, zulu:l.zulu}));
        return [...add, ...prev];
      });
      setUnread(u=>u+fresh.length);
      fresh.slice(0,3).forEach(l=>
        pushToast('warn','ACTUALIZACIÓN '+(l.icao||''), l.summary||'Cambio operacional recibido'));
    }
  }

  // acusar recibo: quita la alerta y, si no quedan más para ese aeropuerto, detiene el parpadeo
  function ackAlert(id){
    setAlerts(prev=>{
      const a=prev.find(x=>x.id===id);
      const rest=prev.filter(x=>x.id!==id);
      if(a && !rest.some(x=>x.icao===a.icao)){
        setAirports(ap=>ap.map(x=>x.icao===a.icao?{...x,changed:[]}:x));
      }
      return rest;
    });
    setUnread(u=>Math.max(0,u-1));
  }
  function ackAll(){
    setAirports(ap=>ap.map(x=>({...x,changed:[]})));
    setAlerts([]); setUnread(0);
  }

  function pushToast(kind,title,msg){
    const id=Math.random();
    setToasts(t=>[...t,{id,kind,title,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4500);
  }

  // publica un cambio y lo difunde a todas las unidades
  async function commitChange(icao, next, diff){
    // capa de permisos: revalida en el "commit", no solo en la UI
    const target=airports.find(a=>a.icao===icao);
    if(!canEditAirport(user,target)){
      pushToast('warn','ACCESO DENEGADO','Tu rol no permite editar '+icao);
      setEditing(null); return;
    }
    const ts=Date.now();
    // estampa con la unidad dueña del aeródromo (un usuario multi-unidad edita varias)
    const stamp=(user.role==='unit'?target.owner:user.unit)||ROLE_SHORT[user.role]||'ADMIN';
    const newAirports=airports.map(a=>a.icao===icao
      ? {...a,...next,updatedAt:ts,updatedBy:user.name+' · '+stamp,changed:[]}
      : a);
    const summary=diff.map(d=>fieldLabel(d.field)+': '+d.to).join(' · ');
    const logEntry={id:ts,type:'upd',icao,unit:stamp,user:user.name,ts,diff,summary,zulu:nowZ()};
    const newLogs=[logEntry,...logs].slice(0,200);
    seenLogs.current.add(ts);          // nuestro propio cambio no debe auto-alertarnos
    setAirports(newAirports);
    setLogs(newLogs);
    setEditing(null);
    pushToast('ok','PUBLICADO '+icao, summary+' — enviado a todas las unidades');
    const ver=Date.now();
    lastVer.current=ver;
    await publishState({_ver:ver, airports:newAirports, logs:newLogs});
  }

  // publica la edición del CATÁLOGO maestro (numeración de pistas, aproximaciones y
  // puntos de entrada con su STAR) de un aeródromo y lo difunde a todas las unidades.
  // admin → cualquier unidad; unit → solo la suya (revalidado en el commit).
  async function commitCatalog(icao, lists){
    const target=airports.find(a=>a.icao===icao);
    if(!canEditAirport(user,target)){
      pushToast('warn','ACCESO DENEGADO','Tu rol no permite editar el catálogo de '+icao);
      return {error:'Sin permiso para esta unidad'};
    }
    const rwys=cleanList(lists.rwys), apps=cleanList(lists.apps), eps=cleanList(lists.eps), stars=cleanStars(lists.stars, eps);
    if(!rwys.length) return {error:'Debe existir al menos una pista'};
    // datos de identificación (edición completa); si no vienen, se conservan los actuales
    const name=(lists.name!==undefined ? (lists.name||'').trim() : target.name)||target.icao;
    const city=(lists.city!==undefined ? (lists.city||'').trim() : (target.city||''));
    // diff para la bitácora (solo lo que cambió)
    const diff=[];
    const cmp=(field,oldArr,newArr)=>{
      const a=(oldArr||[]).join(', '), b=newArr.join(', ');
      if(a!==b) diff.push({field, from:a||'—', to:b||'—'});
    };
    if((target.name||'')!==name) diff.push({field:'name', from:target.name||'—', to:name});
    if((target.city||'')!==city) diff.push({field:'city', from:target.city||'—', to:city||'—'});
    cmp('rwys',target.rwys,rwys); cmp('apps',target.apps,apps); cmp('eps',target.eps,eps);
    if(starsStr(target.stars)!==starsStr(stars))
      diff.push({field:'stars', from:starsStr(target.stars)||'—', to:starsStr(stars)||'—'});
    if(!diff.length){ pushToast('ok','SIN CAMBIOS '+icao,'El aeródromo ya estaba actualizado'); return {ok:true}; }
    // reconcilia la operación vigente (en uso) a lo que sigue existiendo en el catálogo
    let rwyu=(target.rwyu||[]).filter(x=>rwys.includes(x)); if(!rwyu.length) rwyu=[rwys[0]];
    const appu=(target.appu||[]).filter(x=>apps.includes(x));
    const epuse=reconcileEpUse(eps,stars,target.epuse);
    const ts=Date.now();
    const stamp=(user.role==='unit'?target.owner:user.unit)||ROLE_SHORT[user.role]||'ADMIN';
    const newAirports=airports.map(a=>a.icao===icao
      ? {...a,name,city,rwys,apps,eps,stars,rwyu,appu,epuse,updatedAt:ts,updatedBy:user.name+' · '+stamp,changed:[]}
      : a);

    setLogs(newLogs);

  // ALTA de una unidad aeroportuaria (solo Administrador General). Se difunde a la red.
  async function createAirport(data){
    if(!canManageAirports(userRef.current)) return {error:'Sin permiso'};
    const icao=(data.icao||'').trim().toUpperCase();
    if(!/^[A-Z0-9]{3,5}$/.test(icao)) return {error:'OACI inválido (3-5 caracteres alfanuméricos)'};
    if(airports.some(a=>a.icao===icao)) return {error:'Ya existe un aeródromo con ese OACI'};
    const rwys=cleanList(data.rwys), apps=cleanList(data.apps), eps=cleanList(data.eps), stars=cleanStars(data.stars, eps);
    if(!rwys.length) return {error:'Debe existir al menos una pista'};
    const ts=Date.now();
    const stamp=user.unit||ROLE_SHORT[user.role]||'ADMIN';
    // la unidad propietaria es el propio aeródromo (su OACI): se crea como nueva unidad
    const newAp={icao, city:(data.city||'').trim(), name:(data.name||'').trim()||icao, owner:icao,
      rwys, apps, eps, stars, rwyu:[rwys[0]], appu:apps.length?[apps[0]]:[], epuse:reconcileEpUse(eps,stars,{}),
      updatedAt:ts, updatedBy:user.name+' · '+stamp, changed:[]};
    const newAirports=[...airports,newAp];
    const logEntry={id:ts,type:'cat',icao,unit:user.unit||stamp,user:user.name,ts,
      diff:[{field:'alta',from:'—',to:icao+' · '+newAp.name}],
      summary:'Aeródromo '+icao+' agregado a la red',zulu:nowZ()};
    const newLogs=[logEntry,...logs].slice(0,200);
    seenLogs.current.add(ts);
    setAirports(newAirports); setLogs(newLogs);
    pushToast('ok','AERÓDROMO CREADO',icao+' · '+newAp.name);
    const ver=Date.now(); lastVer.current=ver;
    await publishState({_ver:ver, airports:newAirports, logs:newLogs});
    return {ok:true};
  }

  // BAJA de una unidad aeroportuaria (solo Administrador General). Se difunde a la red.

  // autenticación: valida credenciales contra la base de usuarios y, recién
  // autenticado, fija perfil (rol/unidad) y la vista inicial según atribuciones
  async function login(username,password,remember){
    const rec=(usersMapRef.current||{})[username];
    if(!rec) return {error:'Usuario no encontrado'};
    if(rec.active===false) return {error:'Usuario inactivo. Contacta al administrador.'};
    const hash=await hashPassword(password, rec.salt||'');
    if(hash!==rec.passHash) return {error:'Contraseña incorrecta'};
    const units=userUnits(rec);                 // una o varias unidades gestionadas
    const primary=units[0]||'';
    const unitObj=UNITS.find(x=>x.code===primary);
    const profile={
      username, name:rec.name, role:rec.role, unit:primary, units,
      region:unitObj?unitObj.region:'', mustChangePassword:!!rec.mustChangePassword
    };
    setUser(profile);
    // "Mantener sesión iniciada": persiste el perfil (sin contraseña) en el dispositivo.
    try{
      if(remember) localStorage.setItem(SESSION_KEY, JSON.stringify(profile));
      else localStorage.removeItem(SESSION_KEY);
    }catch(e){}
    setView(viewsFor(rec.role)[0]);
    return {ok:true};
  }

  // cierre de sesión: limpia el estado y la sesión recordada del dispositivo
  function logout(){
    try{ localStorage.removeItem(SESSION_KEY); }catch(e){}

  }

    setUser(u=>u?{...u,mustChangePassword:false}:u);

  // --- gestión de usuarios (solo Administrador General) ---
  async function createUser(data){
    if(!canManageUsers(userRef.current)) return {error:'Sin permiso'};
    if(!USERNAME_RE.test(data.username)) return {error:'Usuario inválido (3-32 · letras, números, _ o -)'};
    if(usersMapRef.current[data.username]) return {error:'Ya existe ese usuario'};
    if(!data.password||data.password.length<6) return {error:'La contraseña debe tener 6+ caracteres'};
    // unidad → una o varias; general → una sola (se recorta al primer elemento)
    let units = roleNeedsUnit(data.role) ? (data.units||[]).filter(Boolean) : [];
    if(data.role==='general') units=units.slice(0,1);
    if(roleNeedsUnit(data.role) && !units.length) return {error:'Selecciona al menos una unidad asignada'};
    const salt=randSalt(); const passHash=await hashPassword(data.password,salt);
    await writeUserDb(data.username,{
      username:data.username, name:data.name||data.username, role:data.role,
      unit: units[0]||'', units,           // unit = primaria (compat); units = todas
      salt, passHash, mustChangePassword:true, active:true,
      createdAt:Date.now(), createdBy:userRef.current.name
    });
    pushToast('ok','USUARIO CREADO',data.username+' · '+ROLE_LABEL[data.role]);
    return {ok:true};
  }
  async function saveUser(username,patch){
    if(!canManageUsers(userRef.current)) return {error:'Sin permiso'};
    const cur=usersMapRef.current[username]; if(!cur) return {error:'No existe'};
    let extra={};
    if(patch.password){
      if(patch.password.length<6) return {error:'La contraseña debe tener 6+ caracteres'};
      const salt=randSalt();
      extra={salt,passHash:await hashPassword(patch.password,salt),mustChangePassword:true};
    }
    const role=patch.role||cur.role;
    let units = roleNeedsUnit(role)
      ? (patch.units!==undefined ? (patch.units||[]).filter(Boolean) : userUnits(cur))
      : [];
    if(role==='general') units=units.slice(0,1);
    if(roleNeedsUnit(role) && !units.length) return {error:'Selecciona al menos una unidad asignada'};
    await writeUserDb(username,{
      ...cur,
      name:patch.name!==undefined?patch.name:cur.name,
      role, unit:units[0]||'', units,
      active:patch.active!==undefined?patch.active:(cur.active!==false),
      ...extra
    });
    pushToast('ok','USUARIO ACTUALIZADO',username);
    return {ok:true};
  }

  if(!user) return h(Login,{onLogin:login});

        view==='log' && h(LogView,{logs,user}),

        view==='catalog' && canUseCatalog(user) && h(CatalogAdmin,{airports,user,onSave:commitCatalog,
          onCreate:createAirport,onDelete:removeAirport}),
        view==='users' && canManageUsers(user) && h(UsersAdmin,{users,currentUser:user,
          onNew:()=>setEditingUser({__new:true}),onEdit:u=>setEditingUser(u),onDelete:removeUser}),
      )
    ),

    editingUser && h(UserEditor,{

      h('div',{key:t.id,className:'toast'+(t.kind==='warn'?' warn':'')},

  );
}

function fieldLabel(f){
  return f==='rwyu'?'PISTAS EN USO':f==='appu'?'APROX. EN USO':f==='epuse'?'STAR EN USO':
         f==='rwys'?'PISTAS':f==='apps'?'APROX.':f==='eps'?'PTOS. ENTRADA':f==='stars'?'STARS':
         f==='name'?'NOMBRE':f==='city'?'CIUDAD':
         f==='alta'?'ALTA':f==='baja'?'BAJA':f;
}
// normaliza una lista de strings: recorta, descarta vacíos y duplicados (insensible a mayúsculas)
function cleanList(arr){
  const seen=new Set(), out=[];
  (arr||[]).forEach(x=>{ const v=(x||'').trim(), k=v.toUpperCase();
    if(v && !seen.has(k)){ seen.add(k); out.push(v); } });
  return out;
}
// normaliza STARs [{name,eps:[...]}]: recorta nombres, dedup por nombre, filtra eps a los válidos
function cleanStars(arr, eps){
  const valid=new Set((eps||[]).map(x=>(x||'').trim().toUpperCase()).filter(Boolean));
  const seen=new Set(), out=[];
  (arr||[]).forEach(s=>{
    const name=((s&&s.name)||'').trim(), k=name.toUpperCase();
    if(name && !seen.has(k)){
      seen.add(k);
      const eList=[...new Set(((s&&s.eps)||[]).map(e=>(e||'').trim().toUpperCase()).filter(e=>valid.has(e)))];
      out.push({name, eps:eList});
    }
  });
  return out;
}
function starsStr(arr){ return (arr||[]).map(s=>s.name+'['+(s.eps||[]).join('/')+']').join(', '); }
// STARs que sirven a un punto de entrada dado
function starsForEp(stars, ep){ return (stars||[]).filter(s=>(s.eps||[]).includes(ep)).map(s=>s.name); }
// reconcilia la STAR en uso por punto de entrada contra el catálogo vigente
function reconcileEpUse(eps, stars, prev){
  const out={};
  (eps||[]).forEach(ep=>{
    const serving=starsForEp(stars,ep), cur=(prev||{})[ep];
    out[ep] = (cur && serving.includes(cur)) ? cur : (serving[0]||'');
  });
  return out;
}
function epUseStr(eps, m){ return (eps||[]).map(ep=>ep+'/'+((m&&m[ep])||'—')).join(', '); }

function Login({onLogin}){

  const [password,setPassword]=useState('');
  const [remember,setRemember]=useState(false);
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

    if(!username.trim()||!password||busy) return;

    setBusy(false);
    if(r&&r.error) setErr(r.error);
  };
  return h('div',{className:'login'},
    h('div',{className:'loginbox'},
      h('div',{className:'lh'}, GLYPH,
        h('b',null,'RWYCAST'),

        h('div',{className:'field'},
          h('label',null,'Usuario'),
          h('input',{value:username,placeholder:'usuario',autoCapitalize:'none',autoCorrect:'off',spellCheck:false,

            style:{fontSize:14},
            onChange:e=>setPassword(e.target.value),
            onKeyDown:e=>{if(e.key==='Enter')submit();}})),
        h('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginBottom:14,
            fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)',letterSpacing:'.04em',userSelect:'none'}},
          h('input',{type:'checkbox',checked:remember,style:{width:14,height:14,accentColor:'var(--phos)',cursor:'pointer'},

        h('button',{className:'btn primary',style:{width:'100%'},disabled:busy||!username.trim()||!password,
          onClick:submit}, busy?'Verificando…':'Iniciar sesión')

/* ---------------- Cambio de contraseña obligatorio ---------------- */
function ForcePassword({user,onSubmit,onLogout}){
  const [p1,setP1]=useState(''); const [p2,setP2]=useState('');
  const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
  const submit=async()=>{
    if(p1.length<6) return setErr('Mínimo 6 caracteres');
    if(p1!==p2) return setErr('Las contraseñas no coinciden');
    setBusy(true); setErr('');
    const r=await onSubmit(p1); setBusy(false);
    if(r&&r.error) setErr(r.error);
  };
  return h('div',{className:'login'},
    h('div',{className:'loginbox'},
      h('div',{className:'lh'}, GLYPH,
        h('b',null,'RWYCAST'),
        h('small',null,'CAMBIO DE CONTRASEÑA REQUERIDO')),
      h('div',{className:'lb'},
        h('div',{className:'lead'},'Hola '+user.name+'. Define una nueva contraseña para continuar.'),
        h('div',{className:'field'},
          h('label',null,'Nueva contraseña'),
          h('input',{type:'password',value:p1,placeholder:'mínimo 6 caracteres',style:{fontSize:14},
            onChange:e=>setP1(e.target.value)})),
        h('div',{className:'field'},
          h('label',null,'Repetir contraseña'),
          h('input',{type:'password',value:p2,style:{fontSize:14},
            onChange:e=>setP2(e.target.value),onKeyDown:e=>{if(e.key==='Enter')submit();}})),
        err && h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--red)',marginBottom:14}},'⚠ '+err),
        h('button',{className:'btn primary',style:{width:'100%',marginBottom:10},disabled:busy,onClick:submit},
          busy?'Guardando…':'Guardar y continuar'),
        h('button',{className:'btn ghost',style:{width:'100%'},onClick:onLogout},'Cancelar y salir')
      )
    )
  );
}

/* ---------------- Editor Drawer ---------------- */
function Editor({ap,user,onClose,onSave}){
  const [rwyu,setRwyu]=useState(ap.rwyu||[]);
  const [appu,setAppu]=useState(ap.appu||[]);
  const [epuse,setEpuse]=useState(ap.epuse||{});
  const diff=[];
  const cmpUse=(field,oldArr,newArr)=>{
    const a=(oldArr||[]).join(' / '), b=(newArr||[]).join(' / ');
    if(a!==b) diff.push({field,from:a||'—',to:b||'—'});
  };
  cmpUse('rwyu',ap.rwyu,rwyu); cmpUse('appu',ap.appu,appu);
  if(epUseStr(ap.eps,ap.epuse)!==epUseStr(ap.eps,epuse))
    diff.push({field:'epuse',from:epUseStr(ap.eps,ap.epuse),to:epUseStr(ap.eps,epuse)});

  // selección múltiple: alterna la pertenencia de cada opción en el arreglo "en uso"
  const segMulti=(label,opts,sel,set)=>h('div',{className:'field'},
    h('label',null,label,' ',h('span',{className:'hint'},'una o más')),
    h('div',{className:'seg'}, opts.map(o=>h('button',{key:o,className:sel.includes(o)?'on':'',
      onClick:()=>set(sel.includes(o)?sel.filter(x=>x!==o):[...sel,o])},o))));

  return h('div',{className:'scrim',onClick:e=>{if(e.target.className==='scrim')onClose();}},
    h('div',{className:'drawer'},
      h('div',{className:'dhead'},
        h('div',{className:'icao'},ap.icao),
        h('div',null,
          h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)',letterSpacing:'.04em'}},ap.name),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--ink-faint)',marginTop:3,letterSpacing:'.1em'}},'CONFIGURACIÓN OPERACIONAL')),
        h('button',{className:'x',onClick:onClose},'✕')),
      h('div',{className:'dbody'},
        diff.length>0 && h('div',{className:'diffbox'},
          h('div',{className:'dl'},'⚠ Cambios pendientes de publicación'),
          diff.map(d=>h('div',{className:'diffrow',key:d.field},
            h('b',null,fieldLabel(d.field)),
            h('span',{className:'from'},d.from), h('span',null,'→'), h('span',{className:'to'},d.to)))),
        segMulti('Pistas en uso', ap.rwys, rwyu, setRwyu),
        segMulti('Aproximaciones en uso', ap.apps, appu, setAppu),
        (ap.eps&&ap.eps.length>0) && h('div',{className:'field'},
          h('label',null,'STAR en uso por punto de entrada ',h('span',{className:'hint'},'una por punto')),
          h('div',{className:'epuse'},
            ap.eps.map((ep,i)=>{
              const opts=starsForEp(ap.stars,ep);
              return h('div',{className:'epuserow',key:i},
                h('div',{className:'epusep'}, ep),
                opts.length===0
                  ? h('span',{className:'epusenone'},'sin STAR en catálogo')
                  : h('div',{className:'seg'}, opts.map(o=>h('button',{key:o,
                      className:(epuse[ep]===o)?'on':'',
                      onClick:()=>setEpuse({...epuse,[ep]:o})},o))));
            }))),
        h('div',{className:'field'},
          h('label',null,'Observación operacional ',h('span',{className:'hint'},'opcional')),
          h('textarea',{placeholder:'Ej. cambio por viento 210/14, pista preferencial nocturna…'}))
      ),
      h('div',{className:'dfoot'},
        h('button',{className:'btn ghost',style:{flex:1},onClick:onClose},'Cancelar'),
        h('button',{className:'btn primary',style:{flex:2},disabled:diff.length===0||rwyu.length===0,
          onClick:()=>onSave(ap.icao,{rwyu,appu,epuse},diff)},
          rwyu.length===0?'Selecciona pista en uso'
            :(diff.length?('Publicar '+diff.length+' cambio'+(diff.length>1?'s':'')):'Sin cambios')))
    )
  );
}

/* ---------------- Catálogo: listado de unidades aeroportuarias ----------------
   Muestra las unidades editables como una lista; el botón Editar abre un drawer con
   la edición completa del aeródromo (nombre, ciudad, pistas, aproximaciones, puntos
   de entrada y STAR), que alimenta los selectores del visor operacional.
   Admin → toda la red; Usuario de unidad → solo sus unidades. */
function CatalogAdmin({airports,user,onSave,onCreate,onDelete}){
  const [adding,setAdding]=useState(false);
  const [editing,setEditing]=useState(null);   // OACI del aeródromo en edición (drawer)
  const editable=airports.filter(a=>canEditAirport(user,a));
  const isAdmin=canManageAirports(user);
  const scope = user.role==='admin' ? 'TODA LA RED' : (userUnits(user).join(' · ')||'MI UNIDAD');
  const current=editing?airports.find(a=>a.icao===editing):null;
  return h('div',null,
    h('div',{className:'phead',style:{borderTop:'none'}},
      h('h3',null,'Catálogo de unidades aeroportuarias'),
      h('span',{className:'sub'}, editable.length+' AERÓDROMO'+(editable.length===1?'':'S')+' · '+scope)),
    h('div',{className:'catwrap'},
      h('div',{className:'catnote'},
        'Selecciona una unidad y presiona Editar para modificar sus datos: nombre, ciudad, pistas (numeración), ',
        'aproximaciones, puntos de entrada y STAR. Al guardar, los cambios se publican a todas las unidades.',
        isAdmin && h('span',null,' Como Administrador General también puedes agregar o eliminar unidades aeroportuarias.')),
      isAdmin && h('div',{className:'toolbar'},
        h('button',{className:'filterbtn on',onClick:()=>setAdding(true)},'+ Nueva unidad')),
      (editable.length===0 && !isAdmin) &&
        h('div',{className:'empty'},'No tienes aeródromos asignados para editar.'),
      editable.length>0 && h('div',{className:'apgrid'},
        editable.map(a=>h(CatalogListRow,{key:a.icao,a,user,
          onEdit:()=>setEditing(a.icao),
          onDelete:isAdmin?onDelete:null}))),
      adding && h(AirportEditor,{user,onClose:()=>setAdding(false),
        onCreate:async d=>{const r=await onCreate(d); if(r&&r.ok)setAdding(false); return r;}}),
      current && h(CatalogUnitEditor,{key:current.icao+'_'+current.updatedAt, a:current, user,
        onClose:()=>setEditing(null),
        onSave:async(icao,d)=>{const r=await onSave(icao,d); if(r&&r.ok)setEditing(null); return r;},
        onDelete:isAdmin?async icao=>{const r=await onDelete(icao); if(r&&r.ok)setEditing(null); return r;}:null}))
  );
}

/* editor de STARs: cada STAR tiene un nombre y sirve a uno o más puntos de entrada
   (se seleccionan con chips desde la lista de puntos de entrada del aeródromo) */
function StarsEditor({stars,eps,onChange,className}){
  const validEps=(eps||[]).filter(x=>(x||'').trim());
  const setStar=(i,patch)=>onChange(stars.map((s,j)=>j===i?{...s,...patch}:s));
  const toggleEp=(i,ep)=>{
    const cur=stars[i].eps||[];
    setStar(i,{eps: cur.includes(ep)?cur.filter(x=>x!==ep):[...cur,ep]});
  };
  return h('div',{className:className||'catcol'},
    h('div',{className:'catlbl'},'STAR',
      h('span',{className:'catn'}, stars.filter(s=>(s.name||'').trim()).length)),
    stars.map((s,i)=>h('div',{className:'staritem',key:i},
      h('div',{className:'starhead'},
        h('input',{value:s.name||'',placeholder:'Nombre STAR (ej. DOSO1A)',autoCapitalize:'characters',autoCorrect:'off',spellCheck:false,
          onChange:e=>setStar(i,{name:e.target.value.toUpperCase()})}),
        h('button',{className:'catrm',title:'Eliminar',onClick:()=>onChange(stars.filter((_,j)=>j!==i))},'✕')),
      h('div',{className:'starps'},
        h('span',{className:'starpslbl'},'Sirve a:'),
        validEps.length===0
          ? h('span',{className:'starempty'},'define primero puntos de entrada')
          : validEps.map(ep=>h('button',{key:ep,type:'button',
              className:'epchip'+((s.eps||[]).includes(ep)?' on':''),
              onClick:()=>toggleEp(i,ep)},ep))))),
    h('button',{className:'catadd',onClick:()=>onChange([...stars,{name:'',eps:[]}])},'+ Agregar STAR'));
}

/* ---------------- Edición completa de una unidad aeroportuaria (drawer) ----------------
   Se abre desde el listado del Catálogo con el botón Editar. Permite modificar nombre,
   ciudad, pistas, aproximaciones, puntos de entrada y STAR. El OACI es la identidad y no
   se edita. admin → cualquier unidad; usuario de unidad → solo las suyas. */
function CatalogUnitEditor({a,user,onClose,onSave,onDelete}){
  const [name,setName]=useState(a.name||'');
  const [city,setCity]=useState(a.city||'');
  const [rwys,setRwys]=useState(a.rwys||[]);
  const [apps,setApps]=useState(a.apps||[]);
  const [eps,setEps]=useState(a.eps||[]);
  const [stars,setStars]=useState(a.stars||[]);
  const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
  const owns=userUnits(user).includes(a.owner);
  const dirty = JSON.stringify([name,city,rwys,apps,eps,stars])
              !==JSON.stringify([a.name||'',a.city||'',a.rwys||[],a.apps||[],a.eps||[],a.stars||[]]);
  const save=async()=>{
    setBusy(true); setErr('');
    const r=await onSave(a.icao,{name,city,rwys,apps,eps,stars});
    setBusy(false);
    if(r&&r.error) setErr(r.error);
  };
  const del=async()=>{
    if(!window.confirm('¿Eliminar la unidad aeroportuaria "'+a.icao+'" ('+a.name+')?\nSe quitará de toda la red operacional.')) return;
    setBusy(true); setErr('');
    const r=await onDelete(a.icao);
    if(r&&r.error){ setBusy(false); setErr(r.error); }
  };
  return h('div',{className:'scrim',onClick:e=>{if(e.target.className==='scrim')onClose();}},
    h('div',{className:'drawer'},
      h('div',{className:'dhead'},
        h('div',{className:'icao',style:{fontSize:18}}, a.icao),
        h('div',null,
          h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)',letterSpacing:'.04em'}},'Editar unidad aeroportuaria'),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--ink-faint)',marginTop:3,letterSpacing:'.1em'}},
            (owns?'MI UNIDAD':(user.role==='admin'?'ACCESO ADMIN':''))+' · '+a.owner)),
        h('button',{className:'x',onClick:onClose},'✕')),
      h('div',{className:'dbody'},
        h('div',{className:'field'},
          h('label',null,'Ciudad'),
          h('input',{value:city,placeholder:'Santiago',style:{fontSize:14},onChange:e=>setCity(e.target.value)})),
        h('div',{className:'field'},
          h('label',null,'Nombre del aeródromo'),
          h('input',{value:name,placeholder:'A. Merino Benítez',style:{fontSize:14},onChange:e=>setName(e.target.value)})),
        h(ListEditor,{label:'Pistas', items:rwys, onChange:setRwys, placeholder:'Ej. 17L', className:'catcol bare'}),
        h(ListEditor,{label:'Aproximaciones', items:apps, onChange:setApps, placeholder:'Ej. ILS Z 17L', className:'catcol bare'}),
        h(ListEditor,{label:'Puntos de entrada', items:eps, onChange:setEps, placeholder:'Ej. DOSO', className:'catcol bare'}),
        h(StarsEditor,{stars, eps, onChange:setStars, className:'catcol bare'}),
        dirty && !err && h('div',{style:{fontFamily:'var(--mono)',fontSize:10.5,color:'var(--amber)',marginTop:4}},'● Cambios sin publicar'),
        err && h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--red)',marginTop:4}},'⚠ '+err)
      ),
      h('div',{className:'dfoot'},
        onDelete && h('button',{className:'btn ghost catdel',onClick:del,disabled:busy},'Eliminar'),
        h('button',{className:'btn ghost',style:{flex:1},onClick:onClose},'Cancelar'),
        h('button',{className:'btn primary',style:{flex:2},disabled:busy||!dirty,onClick:save},
          busy?'Publicando…':'Publicar cambios'))
    )
  );
}

    h('div',{className:'drawer'},
      h('div',{className:'dhead'},
        h('div',{className:'icao',style:{fontSize:18}}, icao.trim()?icao.trim().toUpperCase():'NUEVO'),
        h('div',null,
          h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)',letterSpacing:'.04em'}},'Agregar unidad aeroportuaria'),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--ink-faint)',marginTop:3,letterSpacing:'.1em'}},'ALTA EN LA RED OPERACIONAL')),
        h('button',{className:'x',onClick:onClose},'✕')),
      h('div',{className:'dbody'},
        h('div',{className:'field'},
          h('label',null,'OACI ',h('span',{className:'hint'},'3-5 · ej. SCEL')),
          h('input',{value:icao,autoCapitalize:'characters',autoCorrect:'off',spellCheck:false,
            placeholder:'SCEL',onChange:e=>setIcao(e.target.value.toUpperCase())})),
        h('div',{className:'field'},
          h('label',null,'Ciudad'),
          h('input',{value:city,placeholder:'Santiago',style:{fontSize:14},onChange:e=>setCity(e.target.value)})),
        h('div',{className:'field'},
          h('label',null,'Nombre del aeródromo'),
          h('input',{value:name,placeholder:'A. Merino Benítez',style:{fontSize:14},onChange:e=>setName(e.target.value)})),
        h(ListEditor,{label:'Pistas', items:rwys, onChange:setRwys, placeholder:'Ej. 17L', className:'catcol bare'}),
        h(ListEditor,{label:'Aproximaciones', items:apps, onChange:setApps, placeholder:'Ej. ILS Z 17L', className:'catcol bare'}),
        h(ListEditor,{label:'Puntos de entrada', items:eps, onChange:setEps, placeholder:'Ej. DOSO', className:'catcol bare'}),
        h(StarsEditor,{stars, eps, onChange:setStars, className:'catcol bare'}),
        err && h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--red)',marginTop:4}},'⚠ '+err)
      ),
      h('div',{className:'dfoot'},
        h('button',{className:'btn ghost',style:{flex:1},onClick:onClose},'Cancelar'),
        h('button',{className:'btn primary',style:{flex:2},disabled:busy,onClick:submit},
          busy?'Creando…':'Crear aeródromo'))
    )
  );
}

/* ---------------- Gestión de usuarios (Administrador General) ---------------- */
function UsersAdmin({users,currentUser,onNew,onEdit,onDelete}){
  const [q,setQ]=useState('');
  const [roleF,setRoleF]=useState('');     // filtro por tipo de usuario (rol)
  const [unitF,setUnitF]=useState('');     // filtro por unidad a la que pertenece
  const all=Object.values(users||{});
  // unidades presentes entre los usuarios (alimenta el selector de filtro por unidad)
  const unitSet=Array.from(new Set(all.flatMap(u=>userUnits(u)))).sort();
  const qq=q.trim().toLowerCase();
  const list=all
    .filter(u=> !qq || (u.username||'').toLowerCase().includes(qq) || (u.name||'').toLowerCase().includes(qq))
    .filter(u=> !roleF || u.role===roleF)
    .filter(u=> !unitF || userUnits(u).includes(unitF))
    .sort((a,b)=>(ROLES.indexOf(a.role)+'_'+a.username).localeCompare(ROLES.indexOf(b.role)+'_'+b.username));
  const total=all.length;
  return h('div',null,
    h('div',{className:'phead',style:{borderTop:'none'}},
      h('h3',null,'Gestión de usuarios'),
      h('span',{className:'sub'}, list.length+' / '+total+' CUENTA'+(total===1?'':'S')+' · ACCESO ADMIN')),
    h('div',{className:'gridwrap'},
      h('div',{className:'toolbar'},
        h('button',{className:'filterbtn on',onClick:onNew},'+ Nuevo usuario'),
        h('div',{className:'search'}, Ic.search({}),
          h('input',{value:q,placeholder:'Buscar usuario / nombre…',onChange:e=>setQ(e.target.value)})),
        h('select',{value:roleF,onChange:e=>setRoleF(e.target.value),title:'Filtrar por tipo de usuario'},
          h('option',{value:''},'Todos los roles'),
          ROLES.map(r=>h('option',{key:r,value:r},ROLE_LABEL[r]))),
        h('select',{value:unitF,onChange:e=>setUnitF(e.target.value),title:'Filtrar por unidad'},
          h('option',{value:''},'Todas las unidades'),
          unitSet.map(u=>h('option',{key:u,value:u},u)))),
      list.length===0
        ? h('div',{className:'empty'}, total===0?'No hay usuarios todavía. Crea el primero.':'Ningún usuario coincide con los filtros.')
        : h('div',{className:'apgrid'},
            list.map(u=>h('div',{className:'apcard',key:u.username},
              h('div',{className:'crest'},
                h('div',null,
                  h('div',{className:'icao',style:{fontSize:16}}, u.username),
                  h('div',{className:'nm'}, u.name),
                  h('div',{className:'city'}, ROLE_LABEL[u.role]||u.role)),
                h('div',{className:'owntag'},
                  h('b',null, roleNeedsUnit(u.role)?(userUnits(u).join(' · ')||'—'):'—'),
                  u.active===false
                    ? h('span',{style:{color:'var(--red)'}},'INACTIVO')
                    : h('span',{style:{color:'var(--phos)'}},'ACTIVO'))),
              h('div',{className:'apfoot'},
                h('span',{className:'age'}, u.mustChangePassword?'⚠ debe cambiar contraseña':('Creado '+ageMin(u.createdAt))),
                h('span',{className:'editlink',onClick:()=>onEdit(u)},'Editar'),
                u.username!==currentUser.username && h('span',{className:'editlink rm',
                  onClick:()=>{ if(window.confirm('¿Eliminar al usuario "'+u.username+'"?')) onDelete(u.username); }},'Eliminar')))))
    )
  );
}

/* ---------------- Editor de usuario (crear / editar) ---------------- */
function UserEditor({rec,currentUser,airports,onClose,onCreate,onSave}){
  const isNew=!rec;
  const [username,setUsername]=useState(rec?rec.username:'');
  const [name,setName]=useState(rec?rec.name:'');
  const [role,setRole]=useState(rec?rec.role:'unit');
  const [units,setUnits]=useState(rec?userUnits(rec):[]);
  const [active,setActive]=useState(rec?rec.active!==false:true);
  const [password,setPassword]=useState('');
  const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
  const needUnit=roleNeedsUnit(role);   // unidad (varias) y general (una) se asignan a unidad(es)
  const multi=role==='unit';            // el usuario de unidad puede gestionar varias
  // unidades disponibles = aeródromos del catálogo (dedup por propietario)
  const unitOpts=Array.from(new Map(
    (airports||[]).map(a=>[a.owner,{code:a.owner,label:a.icao+' · '+a.name}])).values());
  // si el usuario ya tenía unidades que ya no están en el catálogo, las conservamos como opción
  units.forEach(u=>{ if(u && !unitOpts.some(o=>o.code===u)) unitOpts.unshift({code:u,label:u+' · (fuera de catálogo)'}); });
  const roleHelp =
    role==='admin'  ? 'Acceso total: gestiona usuarios y edita cualquier unidad del país.' :
    role==='unit'   ? 'Edita pistas/STAR/aprox de TODAS sus unidades asignadas (una o varias).' :
    role==='sector' ? 'Solo visualización operativa (sin edición de datos).' :
                      'Solo accede al Briefing de turno de su unidad asignada.';
  const submit=async()=>{
    setBusy(true); setErr('');
    const r=isNew
      ? await onCreate({username:username.trim(),name:name.trim(),role,units,password})
      : await onSave(rec.username,{name:name.trim(),role,units,active,password:password||undefined});
    setBusy(false);
    if(r&&r.error) setErr(r.error);
  };
  return h('div',{className:'scrim',onClick:e=>{if(e.target.className==='scrim')onClose();}},
    h('div',{className:'drawer'},
      h('div',{className:'dhead'},
        h('div',{className:'icao',style:{fontSize:18}}, isNew?'NUEVO':rec.username),
        h('div',null,
          h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)',letterSpacing:'.04em'}}, isNew?'Crear cuenta':'Editar cuenta'),
          h('div',{style:{fontFamily:'var(--mono)',fontSize:9.5,color:'var(--ink-faint)',marginTop:3,letterSpacing:'.1em'}},'CONTROL DE ACCESO')),
        h('button',{className:'x',onClick:onClose},'✕')),
      h('div',{className:'dbody'},
        isNew && h('div',{className:'field'},
          h('label',null,'Usuario ',h('span',{className:'hint'},'3-32 · letras, números, _ o -')),
          h('input',{value:username,autoCapitalize:'none',autoCorrect:'off',spellCheck:false,
            style:{textTransform:'none',fontSize:14},onChange:e=>setUsername(e.target.value)})),
        h('div',{className:'field'},
          h('label',null,'Nombre para mostrar'),
          h('input',{value:name,placeholder:'Ej. R. Soto',style:{fontSize:14},onChange:e=>setName(e.target.value)})),
        h('div',{className:'field'},
          h('label',null,'Rol'),
          h('select',{value:role,onChange:e=>setRole(e.target.value)},
            ROLES.map(r=>h('option',{key:r,value:r},ROLE_LABEL[r])))),
        needUnit && h('div',{className:'field'},
          h('label',null, multi?'Unidades asignadas ':'Unidad asignada ',
            h('span',{className:'hint'}, multi?'una o varias del catálogo':'unidades del catálogo')),
          unitOpts.length===0
            ? h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',
                border:'1px solid var(--amber-deep)',padding:'10px 12px',lineHeight:1.5}},
                'No hay unidades en el catálogo. Crea primero un aeródromo en el módulo Catálogo.')
            : multi
              ? h('div',{style:{display:'flex',flexDirection:'column',gap:6,maxHeight:200,overflowY:'auto',
                  border:'1px solid var(--line)',padding:'8px 10px'}},
                  unitOpts.map(o=>h('label',{key:o.code,style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',
                    fontFamily:'var(--mono)',fontSize:12,color:'var(--ink)',userSelect:'none'}},
                    h('input',{type:'checkbox',checked:units.includes(o.code),
                      style:{width:14,height:14,accentColor:'var(--phos)',cursor:'pointer'},
                      onChange:e=>setUnits(prev=> e.target.checked ? [...prev,o.code] : prev.filter(x=>x!==o.code))}),
                    o.label)))
              : h('select',{value:units[0]||'',onChange:e=>setUnits(e.target.value?[e.target.value]:[])},
                  h('option',{value:''},'— Selecciona unidad —'),
                  unitOpts.map(o=>h('option',{key:o.code,value:o.code},o.label)))),
        !isNew && h('div',{className:'field'},
          h('label',null,'Estado de la cuenta'),
          h('div',{className:'seg'},
            h('button',{className:active?'on':'',onClick:()=>setActive(true)},'Activo'),
            h('button',{className:!active?'on':'',onClick:()=>setActive(false)},'Inactivo'))),
        h('div',{className:'field'},
          h('label',null, isNew?'Contraseña inicial':'Restablecer contraseña ',
            !isNew&&h('span',{className:'hint'},'vacío = sin cambio')),
          h('input',{type:'password',value:password,style:{fontSize:14},
            placeholder: isNew?'mínimo 6 caracteres':'nueva contraseña (opcional)',
            onChange:e=>setPassword(e.target.value)})),
        h('div',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--ink-faint)',lineHeight:1.6,
          border:'1px solid var(--line-soft)',padding:'10px 12px'}}, roleHelp),
        err && h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--red)',marginTop:12}},'⚠ '+err)
      ),
      h('div',{className:'dfoot'},
        h('button',{className:'btn ghost',style:{flex:1},onClick:onClose},'Cancelar'),
        h('button',{className:'btn primary',style:{flex:2},disabled:busy,onClick:submit},
          busy?'Guardando…':(isNew?'Crear usuario':'Guardar cambios')))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
