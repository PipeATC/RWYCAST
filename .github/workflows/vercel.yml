# Despliega PipeATC/RWYCAST en la cuenta Vercel de sebacpu (Pro).
# No requiere conectar Git en Vercel ni clonar el repo.
#
# Secrets en GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN        → vercel.com/account/tokens
#   VERCEL_ORG_ID       → .vercel/project.json o Project Settings → General
#   VERCEL_PROJECT_ID   → idem
name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
