name: METAR refresh

# Baja los METAR/SPECI de NOAA AWC (datos oficiales chilenos de la DGAC, redistribuidos)
# y los publica en Firebase RTDB (/runcast/metars). La app RWYCAST los lee en tiempo
# real. Se ejecuta del lado servidor para evitar el bloqueo CORS del sitio estático.
# NOTA: solución provisional. GitHub Actions tiene un mínimo real de ~5 min entre
# ejecuciones programadas y a veces las retrasa. Más adelante se migrará a otro método
# (p. ej. Cloudflare Worker con Cron Trigger) para refresco al minuto.

on:
  schedule:
    - cron: '*/5 * * * *'     # cada 5 minutos (hora UTC); GitHub puede retrasarlo
  workflow_dispatch:          # permite ejecutarlo a mano desde la pestaña Actions
  push:
    paths:
      - '.github/workflows/metar.yml'

permissions:
  contents: read

concurrency:
  group: metar-refresh
  cancel-in-progress: false

jobs:
  fetch:
    if: github.repository == 'PipeATC/RWYCAST'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar METAR y publicar en Firebase RTDB
        env:
          RTDB_URL: https://atcbrief-default-rtdb.firebaseio.com
          # Semilla base por si el estado aún no existe en RTDB.
          DEFAULTS: SCEL,SCDA,SCFA,SCIE,SCTE,SCCI
        run: |
          set -euo pipefail

          # Lee los aeródromos dados de alta en la app (estado compartido en RTDB).
          # Cualquier unidad agregada desde el módulo Catálogo aparece aquí, así su
          # METAR se descarga automáticamente sin tener que editar este workflow.
          echo "Leyendo aeródromos desde RTDB…"
          state=$(curl -sS --retry 3 --retry-delay 5 --max-time 30 \
            "${RTDB_URL}/runcast/state/v1/airports.json" || echo 'null')

          dynamic=$(echo "$state" | jq -r '
            (if type=="array" then map(.icao)
             elif type=="object" then [.[].icao]
             else [] end)
            | map(select(. != null and . != "")) | join(",")
          ')

          # Une la lista dinámica con la semilla, normaliza y deduplica.
          STATIONS=$(printf '%s,%s' "$DEFAULTS" "$dynamic" \
            | tr ',' '\n' | sed 's/[^A-Za-z0-9]//g' | awk 'NF' \
            | tr '[:lower:]' '[:upper:]' | sort -u | paste -sd, -)

          echo "Solicitando METAR para: $STATIONS"
          raw=$(curl -sS --fail --retry 3 --retry-delay 5 --max-time 60 \
            "https://aviationweather.gov/api/data/metar?ids=${STATIONS}&format=json")

          # Transforma el arreglo de AWC a un objeto { ICAO: {raw,cat,obsTime,updatedAt} }
          payload=$(echo "$raw" | jq '
            map(select(.icaoId != null and .rawOb != null) | {
              key: .icaoId,
              value: {
                raw: .rawOb,
                cat: (.fltCat // ""),
                obsTime: .obsTime,
                updatedAt: (now | floor)
              }
            }) | from_entries
          ')

          count=$(echo "$payload" | jq 'length')
          echo "Estaciones recibidas: $count"
          if [ "$count" -eq 0 ]; then
            echo "Sin datos METAR válidos; se omite la escritura para no borrar los anteriores."
            exit 1
          fi

          # PUT reemplaza por completo /runcast/metars con el lote más reciente.
          curl -sS --fail -X PUT \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "${RTDB_URL}/runcast/metars.json" > /dev/null

          echo "Publicado en ${RTDB_URL}/runcast/metars"
