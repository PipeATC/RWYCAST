name = "rwycast-atfm"
main = "worker.js"
compatibility_date = "2025-01-01"

# Una vez al día. 09:10 UTC ≈ 05:10/06:10 en Chile (madrugada): el pronóstico del
# día ya está disponible y publish-to-web ya refrescó su caché. Ajusta a gusto.
[triggers]
crons = ["10 9 * * *"]

[vars]
# URL base de la Realtime Database, SIN barra final.
RTDB_URL = "https://atcbrief-default-rtdb.firebaseio.com"
# Dependencia destino: los datos de SCEL se muestran en el Dashboard de ACCS.
DEP = "ACCS"
# Horizonte: días en adelante ADEMÁS de hoy (3 → hoy + 3 días = 4 nodos de día).
HORIZON_DAYS = "3"
# Aeropuerto/torre tal como aparece en el filtro Dim_Torres del reporte.
PBI_TORRE = "SCEL"
# Capacidad DECLARADA de movimientos/hora. Parámetro OPERACIONAL configurable:
# el reporte solo entrega demanda, no capacidad. Ajústalo al valor real de SCEL.
DECLARED_CAP = "40"

# El endpoint y el resource key traen valores por defecto (los del enlace público
# dado), así que el Worker funciona sin secrets. Solo defínelos como override si
# el reporte cambia de backend o de token:
#   PBI_RESOURCE_KEY   el "k" del token del reporte publish-to-web.
#   PBI_QUERYDATA_URL  URL exacta de querydata (backend regional).
#
# --- Secrets opcionales (con `wrangler secret put <NOMBRE>`) ---
#   FEED_KEY    protege POST /feed y GET /demo con ?key=.
#   RTDB_SECRET database secret de Firebase para escritura con auth.
