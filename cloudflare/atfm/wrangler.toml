name = "rwycast-atfm"
main = "worker.js"
compatibility_date = "2025-01-01"

# Una vez al día. 09:10 UTC ≈ 05:10/06:10 en Chile (madrugada): el pronóstico del
# día ya está disponible y publish-to-web ya refrescó su caché. Ajusta a gusto.
[triggers]
crons = ["10 9 * * *"]

[vars]
# URL base de la Realtime Database, SIN barra final.
RTDB_URL = "https://atcbrief-default-rtdb.firebaseio.com"
# Dependencia destino: los datos de SCEL se muestran en el Dashboard de ACCS.
DEP = "ACCS"
# Horizonte: días en adelante ADEMÁS de hoy (3 → hoy + 3 días = 4 nodos de día).
HORIZON_DAYS = "3"

# --- Secrets (NO van aquí; se cargan con `wrangler secret put <NOMBRE>`) ---
#   PBI_RESOURCE_KEY   el "k" del token del reporte publish-to-web (ver README).
#   PBI_QUERYDATA_URL  URL exacta de querydata capturada del reporte SCEL.
#   PBI_QUERY_BODY     cuerpo JSON exacto de esa petición (como string).
#   FEED_KEY           (opcional) protege POST /feed y GET /demo.
#   RTDB_SECRET        (opcional) database secret de Firebase para escritura con auth.
